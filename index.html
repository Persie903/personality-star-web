<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人格星盘 · 段位评级</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 星空背景 -->
  <canvas id="starCanvas"></canvas>
  <div class="aurora"></div>

  <div class="app-container">

    <!-- ==================== 首页 ==================== -->
    <section id="page-home" class="page active">
      <div class="home-content">
        <div class="constellation-icon">
          <div class="orbit-ring ring-1"></div>
          <div class="orbit-ring ring-2"></div>
          <div class="orbit-ring ring-3"></div>
          <div class="center-star">✦</div>
        </div>

        <h1 class="main-title">
          <span class="title-line-1">人格星盘</span>
          <span class="title-divider">·</span>
          <span class="title-line-2">段位评级</span>
        </h1>

        <p class="home-subtitle">MBTI × 星座  ·  测测你的宇宙段位</p>

        <div class="tier-preview">
          <span class="preview-badge" style="--badge-color: #f0c040">👑 夯</span>
          <span class="preview-badge" style="--badge-color: #a855f7">💎 顶尖</span>
          <span class="preview-badge" style="--badge-color: #3b82f6">🌟 人上人</span>
          <span class="preview-badge" style="--badge-color: #9ca3af">🌐 npc</span>
          <span class="preview-badge" style="--badge-color: #f97316">😅 拉</span>
          <span class="preview-badge" style="--badge-color: #ef4444">💀 拉爆了</span>
        </div>

        <button class="cosmic-btn" onclick="navigateTo('select')">
          <span class="btn-bg"></span>
          <span class="btn-text">开 始 测 试</span>
          <span class="btn-arrow">→</span>
        </button>

        <p class="footer-note">
          🌌 娱乐测试 · 仅供参考 · 勿较真
          <a href="admin.html" class="admin-link" title="管理后台">⚙</a>
        </p>
      </div>
    </section>

    <!-- ==================== 选择页 ==================== -->
    <section id="page-select" class="page">
      <div class="select-content">
        <h2 class="section-heading">
          <span class="heading-icon">🧬</span>
          选择你的 MBTI 人格
        </h2>

        <div class="mbti-grid" id="mbtiGrid">
          <!-- JS 动态生成 -->
        </div>

        <div class="divider-line">
          <span class="divider-star">✦</span>
        </div>

        <h2 class="section-heading">
          <span class="heading-icon">♈</span>
          选择你的星座
        </h2>

        <div class="zodiac-grid" id="zodiacGrid">
          <!-- JS 动态生成 -->
        </div>

        <button class="cosmic-btn submit-btn" id="submitBtn" onclick="handleSubmit()">
          <span class="btn-bg"></span>
          <span class="btn-text">✨ 查看段位</span>
        </button>

        <button class="back-link" onclick="navigateTo('home')">← 返回首页</button>
      </div>
    </section>

    <!-- ==================== 结果页 ==================== -->
    <section id="page-result" class="page">
      <div class="result-content">
        <div class="result-card" id="resultCard">
          <div class="result-glow"></div>

          <div class="tier-badge" id="tierBadge">
            <span class="tier-icon" id="tierIcon"></span>
            <span class="tier-name" id="tierName"></span>
          </div>

          <p class="tier-description" id="tierDesc"></p>

          <div class="result-tags">
            <div class="tag mbti-tag">
              <span class="tag-label">MBTI</span>
              <span class="tag-value" id="tagMbti"></span>
            </div>
            <div class="tag zodiac-tag">
              <span class="tag-label">星座</span>
              <span class="tag-value" id="tagZodiac"></span>
            </div>
            <div class="tag score-tag">
              <span class="tag-label">分数</span>
              <span class="tag-value" id="tagScore"></span>
            </div>
          </div>

          <div class="fun-quote" id="funQuote"></div>
        </div>

        <div class="result-actions">
          <button class="cosmic-btn" onclick="navigateTo('select')">
            <span class="btn-bg"></span>
            <span class="btn-text">🔄 再测一次</span>
          </button>

          <button class="cosmic-btn share-btn" onclick="handleShare()">
            <span class="btn-bg"></span>
            <span class="btn-text">📤 分享结果</span>
          </button>
        </div>

        <button class="back-link" onclick="navigateTo('home')">← 返回首页</button>
      </div>
    </section>
  </div>

  <!-- 分享弹窗 -->
  <div class="modal-overlay" id="shareModal">
    <div class="modal-card">
      <h3 class="modal-title">📤 分享你的段位</h3>
      <p class="modal-share-text" id="shareText"></p>
      <div class="modal-actions">
        <button class="modal-btn copy-btn" onclick="copyShareText()">📋 复制文案</button>
        <button class="modal-btn close-btn" onclick="closeModal()">✕ 关闭</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
