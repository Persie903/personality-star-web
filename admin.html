<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 · 人格星盘评分配置</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a1e;
      --surface: #111130;
      --surface2: #181840;
      --border: rgba(255,255,255,0.08);
      --text: #e2e0f0;
      --text2: #9895b8;
      --text3: #605d80;
      --purple: #a855f7;
      --gold: #f0c040;
      --blue: #3b82f6;
      --green: #22c55e;
      --red: #ef4444;
      --radius: 14px;
      --font-display: 'Orbitron', 'Noto Sans SC', sans-serif;
      --font-body: 'Noto Sans SC', -apple-system, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header */
    .admin-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo { font-size: 24px; }
    .header-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
    }
    .header-badge {
      font-size: 11px;
      background: rgba(168,85,247,0.2);
      color: var(--purple);
      padding: 3px 10px;
      border-radius: 10px;
      letter-spacing: 1px;
    }
    .header-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* Buttons */
    .btn {
      padding: 10px 22px;
      border-radius: 25px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-body);
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: linear-gradient(135deg, #a855f7, #6366f1); color: #fff; }
    .btn-primary:hover { box-shadow: 0 4px 20px rgba(168,85,247,0.4); }
    .btn-gold { background: linear-gradient(135deg, #f0c040, #f59e0b); color: #1a1a2e; }
    .btn-gold:hover { box-shadow: 0 4px 20px rgba(240,192,64,0.4); }
    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text2);
    }
    .btn-outline:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }
    .btn-sm { padding: 6px 14px; font-size: 12px; }
    .btn-danger { background: var(--red); color: #fff; }

    /* Main */
    .admin-main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1;
      padding: 12px 16px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 10px;
      transition: all 0.2s;
      font-family: var(--font-body);
    }
    .tab-btn.active {
      background: var(--surface2);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .tab-btn:hover:not(.active) { color: var(--text); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Section */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    th {
      color: var(--text3);
      font-weight: 500;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    td { color: var(--text2); }

    /* Inputs */
    input[type="number"],
    input[type="text"],
    textarea,
    select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: var(--font-body);
      transition: border-color 0.2s;
      width: 100%;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--purple);
    }
    input[type="number"] { width: 80px; text-align: center; }
    input[type="color"] {
      width: 40px; height: 34px; padding: 2px;
      cursor: pointer; border-radius: 8px;
    }
    textarea { resize: vertical; min-height: 60px; }

    .score-input {
      width: 70px;
      text-align: center;
      font-weight: 600;
      font-family: var(--font-display);
    }

    /* Color dot */
    .color-dot {
      display: inline-block;
      width: 12px; height: 12px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: #22c55e;
      color: #000;
      padding: 12px 28px;
      border-radius: 25px;
      font-size: 15px;
      font-weight: 600;
      z-index: 100;
      animation: toastIn 0.3s ease-out, toastOut 0.3s 2s ease-out forwards;
    }
    .toast.error { background: var(--red); color: #fff; }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    /* ====== Auth Overlay ====== */
    .auth-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      backdrop-filter: blur(20px);
    }
    .auth-overlay.hidden { display: none; }
    .auth-card {
      text-align: center;
      max-width: 380px;
      width: 100%;
    }
    .auth-constellation {
      position: relative;
      width: 100px; height: 100px;
      margin: 0 auto 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .ring-a1 { width: 100px; height: 100px; border-color: rgba(168,85,247,0.2); animation: orbit-spin 10s linear infinite; }
    .ring-a2 { width: 70px; height: 70px; border-color: rgba(240,192,64,0.2); animation: orbit-spin 8s linear infinite reverse; }
    .ring-a3 { width: 40px; height: 40px; border-color: rgba(59,130,246,0.25); animation: orbit-spin 6s linear infinite; }
    .auth-star { font-size: 28px; z-index: 1; animation: star-pulse 2s ease-in-out infinite; }
    @keyframes orbit-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes star-pulse {
      0%,100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.15); opacity: 1; }
    }
    .auth-title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 4px;
      margin-bottom: 8px;
      color: var(--text);
    }
    .auth-subtitle {
      font-size: 14px;
      color: var(--text3);
      margin-bottom: 28px;
    }
    .auth-input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .auth-input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 30px;
      padding: 14px 20px;
      color: var(--text);
      font-size: 18px;
      text-align: center;
      letter-spacing: 8px;
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.3s;
    }
    .auth-input:focus { border-color: var(--purple); }
    .auth-input.error { border-color: var(--red); animation: shake 0.4s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
    .auth-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #a855f7, #6366f1);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .auth-btn:hover { box-shadow: 0 4px 20px rgba(168,85,247,0.4); }
    .auth-btn:active { transform: scale(0.93); }
    .auth-btn:disabled { opacity: 0.4; pointer-events: none; }
    .auth-error {
      margin-top: 14px;
      font-size: 13px;
      color: var(--red);
      min-height: 20px;
    }
    .auth-hint {
      margin-top: 4px;
      font-size: 12px;
      color: var(--text3);
      min-height: 18px;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .admin-header { padding: 12px 16px; }
      .header-title { font-size: 14px; }
      .admin-main { padding: 16px; }
      .section { padding: 16px; }
      th, td { padding: 8px 6px; font-size: 12px; }
      input[type="number"] { width: 56px; }
    }
  </style>
</head>
<body>

  <!-- ====== 密码验证门 ====== -->
  <div class="auth-overlay" id="authOverlay">
    <div class="auth-card">
      <div class="auth-constellation">
        <div class="auth-ring ring-a1"></div>
        <div class="auth-ring ring-a2"></div>
        <div class="auth-ring ring-a3"></div>
        <span class="auth-star">🔒</span>
      </div>
      <h2 class="auth-title">管理后台</h2>
      <p class="auth-subtitle">请输入密码以继续</p>
      <div class="auth-input-row">
        <input type="password" id="authPassword" class="auth-input" placeholder="········" maxlength="32" autocomplete="off">
        <button class="auth-btn" id="authBtn" onclick="handleLogin()">→</button>
      </div>
      <p class="auth-error" id="authError"></p>
      <p class="auth-hint" id="authHint"></p>
    </div>
  </div>

  <!-- Header -->
  <header class="admin-header">
    <div class="header-left">
      <span class="header-logo">⚙️</span>
      <span class="header-title">评分标准配置</span>
      <span class="header-badge">DEVELOPER</span>
    </div>
    <div class="header-actions">
      <button class="btn btn-outline btn-sm" onclick="importConfig()">📥 导入配置</button>
      <button class="btn btn-gold btn-sm" onclick="exportConfig()">📤 导出配置</button>
      <button class="btn btn-primary btn-sm" onclick="saveAndApply()">💾 保存并应用</button>
      <button class="btn btn-outline btn-sm" onclick="changePassword()" style="font-size:12px;">🔑 改密</button>
      <a href="index.html" class="btn btn-outline btn-sm" style="text-decoration:none;">🔮 打开主站</a>
    </div>
  </header>

  <!-- Main Content -->
  <main class="admin-main">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="tab-mbti">🧬 MBTI 评分</button>
      <button class="tab-btn" data-tab="tab-zodiac">♈ 星座评分</button>
      <button class="tab-btn" data-tab="tab-levels">🏆 段位规则</button>
      <button class="tab-btn" data-tab="tab-texts">💬 趣味文案</button>
    </div>

    <!-- Tab: MBTI -->
    <div class="tab-panel active" id="tab-mbti">
      <div class="section">
        <div class="section-header">
          <span class="section-title">🧬 MBTI 人格评分表</span>
          <span style="font-size:13px;color:var(--text3);">分数范围建议 -3 ~ +3</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>MBTI 类型</th><th>分数</th><th>MBTI 类型</th><th>分数</th><th>MBTI 类型</th><th>分数</th><th>MBTI 类型</th><th>分数</th></tr>
            </thead>
            <tbody id="mbtiTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Tab: Zodiac -->
    <div class="tab-panel" id="tab-zodiac">
      <div class="section">
        <div class="section-header">
          <span class="section-title">♈ 星座评分表</span>
          <span style="font-size:13px;color:var(--text3);">分数范围建议 -3 ~ +3</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>星座</th><th>分数</th><th>星座</th><th>分数</th><th>星座</th><th>分数</th><th>星座</th><th>分数</th></tr>
            </thead>
            <tbody id="zodiacTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Tab: Levels -->
    <div class="tab-panel" id="tab-levels">
      <div class="section">
        <div class="section-header">
          <span class="section-title">🏆 段位评级规则</span>
          <span style="font-size:13px;color:var(--text3);">按 minScore 从高到低排序</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>段位名称</th><th>最低分数</th><th>颜色</th><th>图标 Emoji</th><th>描述文案</th></tr>
            </thead>
            <tbody id="levelsTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Tab: Fun Texts -->
    <div class="tab-panel" id="tab-texts">
      <div class="section" id="funTextsContainer">
        <div class="section-header">
          <span class="section-title">💬 趣味文案</span>
          <span style="font-size:13px;color:var(--text3);">每个段位3条随机文案，用换行分隔</span>
        </div>
      </div>
    </div>

    <!-- Bottom actions -->
    <div style="display:flex;gap:12px;justify-content:center;margin-top:32px;flex-wrap:wrap;">
      <button class="btn btn-outline" onclick="resetToDefault()">🔄 恢复默认配置</button>
      <button class="btn btn-gold" onclick="exportConfig()">📤 导出 config.json</button>
      <button class="btn btn-primary" onclick="saveAndApply()">💾 保存并应用到主站</button>
    </div>
  </main>

  <!-- Hidden file input for import -->
  <input type="file" id="importFile" accept=".json" style="display:none;" onchange="handleImport(event)">

  <script src="js/admin.js"></script>
</body>
</html>
